<!DOCTYPE html>
<html lang="en" dir="auto">
    <head>
        <title>New tab</title>

        <meta charset="utf-8" />
        <meta name="theme-color" content="#000" />
        <meta name="mobile-web-app-capable" content="yes" />
        <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no"
        />

        <!-- default icon -->
        <!-- icon -->
        <!-- manifest -->
        <!-- webext-storage -->

        <link rel="stylesheet" href="src/styles/style.css" />
        <style type="text/css" id="styles"></style>
        <style type="text/css" id="fontface"></style>

        <script src="src/scripts/help-mode.js" defer></script>
        <script src="src/scripts/main.js" defer></script>
    </head>

    <body class="init loading">
        <dialog id="contextmenu">
            <form id="editlink-form">
                <label id="edit-title" autofocus>
                    <span class="trn">Title</span>
                    <input
                        id="e-title"
                        type="text"
                        name="e-title"
                        maxlength="64"
                        autocomplete="off"
                        placeholder="Example"
                    />
                </label>

                <label id="edit-url">
                    <span class="trn">Link</span>
                    <input
                        id="e-url"
                        type="text"
                        name="e-url"
                        maxlength="512"
                        autocomplete="off"
                        autocorrect="off"
                        autocapitalize="off"
                        placeholder="https://example.com"
                    />
                </label>

                <hr />

                <!-- <button type="submit" class="trn" id="edit-inputs">Submit from inputs</button> -->
                <button type="submit" class="btn-red" id="edit-delete" formnovalidate>
                    <svg
                        xmlns="http://www.w3.org/2000/svg"
                        fill="none"
                        viewBox="0 0 24 24"
                        stroke-width="1.5"
                        stroke="currentColor"
                    >
                        <path
                            stroke-linecap="round"
                            stroke-linejoin="round"
                            d="m14.74 9-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 0 1-2.244 2.077H8.084a2.25 2.25 0 0 1-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 0 0-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 0 1 3.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 0 0-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 0 0-7.5 0"
                        />
                    </svg>

                    <span class="trn">Delete something</span>
                </button>

                <button type="submit" id="edit-add">
                    <svg
                        xmlns="http://www.w3.org/2000/svg"
                        fill="none"
                        viewBox="0 0 24 24"
                        stroke-width="1.5"
                        stroke="currentColor"
                    >
                        <path
                            stroke-linecap="round"
                            stroke-linejoin="round"
                            d="M12 9v6m3-3H9m12 0a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"
                        />
                    </svg>

                    <span class="trn">Add something</span>
                </button>

                <button type="submit" id="edit-pin">
                    <svg
                        xmlns="http://www.w3.org/2000/svg"
                        fill="none"
                        viewBox="0 0 24 24"
                        stroke-width="1.5"
                        stroke="currentColor"
                    >
                        <path
                            stroke-linecap="round"
                            stroke-linejoin="round"
                            d="M16.5 10.5V6.75a4.5 4.5 0 1 0-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 0 0 2.25-2.25v-6.75a2.25 2.25 0 0 0-2.25-2.25H6.75a2.25 2.25 0 0 0-2.25 2.25v6.75a2.25 2.25 0 0 0 2.25 2.25Z"
                        />
                    </svg>

                    <span class="trn">Pin group</span>
                </button>

                <button type="submit" id="edit-unpin">
                    <svg
                        xmlns="http://www.w3.org/2000/svg"
                        fill="none"
                        viewBox="0 0 24 24"
                        stroke-width="1.5"
                        stroke="currentColor"
                        class="size-6"
                    >
                        <path
                            stroke-linecap="round"
                            stroke-linejoin="round"
                            d="M13.5 10.5V6.75a4.5 4.5 0 1 1 9 0v3.75M3.75 21.75h10.5a2.25 2.25 0 0 0 2.25-2.25v-6.75a2.25 2.25 0 0 0-2.25-2.25H3.75a2.25 2.25 0 0 0-2.25 2.25v6.75a2.25 2.25 0 0 0 2.25 2.25Z"
                        />
                    </svg>

                    <span class="trn">Unpin group</span>
                </button>

                <button type="submit" id="edit-unfolder">
                    <svg
                        xmlns="http://www.w3.org/2000/svg"
                        fill="none"
                        viewBox="0 0 24 24"
                        stroke-width="1.5"
                        stroke="currentColor"
                    >
                        <path
                            stroke-linecap="round"
                            stroke-linejoin="round"
                            d="M9 15 3 9m0 0 6-6M3 9h12a6 6 0 0 1 0 12h-3"
                        />
                    </svg>

                    <span class="trn">Remove from folder</span>
                </button>

                <button type="submit" id="edit-apply">
                    <svg
                        xmlns="http://www.w3.org/2000/svg"
                        fill="none"
                        viewBox="0 0 24 24"
                        stroke-width="1.5"
                        stroke="currentColor"
                    >
                        <path
                            stroke-linecap="round"
                            stroke-linejoin="round"
                            d="M3 3v18h18V6l-3-3H3ZM7.5 3v6h9V3M6 21v-9h12v9M14.25 5.25v1.5"
                        />
                    </svg>
                    <span class="trn">Apply changes</span>
                </button>
                <button type="submit" class="trn" id="edit-unsync">Stop syncing this group</button>
            </form>

            <div id="background-actions">
                <hr />
                <a id="download-background"></a>

                <div class="buttons">
                    <button
                        id="b_interface-background-mute"
                        class="not-safari"
                        title="Enable or disable background video sound"
                        aria-label="Enable or disable background video sound"
                    >
                        <span id="interface-background-mute-icon" class="iconContainer">
                            <svg
                                clip-rule="evenodd"
                                fill-rule="evenodd"
                                stroke-linecap="round"
                                stroke-linejoin="round"
                                viewBox="0 0 22 19"
                                xmlns="http://www.w3.org/2000/svg"
                            >
                                <path
                                    d="m17.25 9.75 2.25 2.25m0 0 2.25 2.25m-2.25-2.25 2.25-2.25m-2.25 2.25-2.25 2.25m-10.5-6 4.72-4.72c.141-.14.331-.219.53-.219.411 0 .75.338.75.749v15.88c0 .411-.339.749-.75.749-.199 0-.389-.079-.53-.219l-4.72-4.72h-2.24c-.88 0-1.704-.507-1.938-1.354-.214-.781-.323-1.586-.322-2.396 0-.83.112-1.633.322-2.396.234-.848 1.058-1.354 1.938-1.354z"
                                    fill="none"
                                    stroke="currentColor"
                                    stroke-width="2"
                                    transform="translate(-1.5 -2.56066)"
                                />
                            </svg>
                        </span>

                        <span class="trn" id="interface-background-mute-string">Mute video background</span>

                        <span id="interface-background-unmute-icon" class="iconContainer">
                            <svg
                                clip-rule="evenodd"
                                fill-rule="evenodd"
                                stroke-linecap="round"
                                stroke-linejoin="round"
                                viewBox="0 0 22 19"
                                xmlns="http://www.w3.org/2000/svg"
                            >
                                <path
                                    d="m19.114 5.636c1.687 1.687 2.636 3.978 2.636 6.364s-.949 4.677-2.636 6.364m-2.651-10.076c2.036 2.036 2.036 5.388 0 7.424m-9.713-7.462 4.72-4.72c.141-.14.331-.219.53-.219.411 0 .75.338.75.749v15.88c0 .411-.339.749-.75.749-.199 0-.389-.079-.53-.219l-4.72-4.72h-2.24c-.88 0-1.704-.507-1.938-1.354-.214-.781-.323-1.586-.322-2.396 0-.83.112-1.633.322-2.396.234-.848 1.058-1.354 1.938-1.354z"
                                    fill="none"
                                    stroke="currentColor"
                                    stroke-width="2"
                                    transform="translate(-1.5 -2.56066)"
                                />
                            </svg>
                        </span>

                        <span class="trn" id="interface-background-unmute-string">Unmute video background</span>
                    </button>

                    <button
                        id="b_interface-background-download"
                        title="Download the current background"
                        aria-label="Download the current background"
                        class="idle"
                    >
                        <span id="idle-download" class="iconContainer">
                            <svg
                                clip-rule="evenodd"
                                fill-rule="evenodd"
                                stroke-linejoin="round"
                                stroke-miterlimit="2"
                                viewBox="0 0 14 14"
                                xmlns="http://www.w3.org/2000/svg"
                            >
                                <g fill-rule="nonzero" fill="currentColor" transform="translate(-3.33333 -5.33333)">
                                    <path
                                        d="m9.167 6.167c0-.461.373-.834.833-.834s.833.373.833.834v5.964l2.703-2.702 1.178 1.179-4.714 4.714-4.714-4.714 1.179-1.179 2.702 2.702z"
                                    />
                                    <path
                                        d="m3.333 13.667h1.667v3.333h10v-3.333h1.667v3.333c0 .921-.746 1.667-1.667 1.667h-10c-.92 0-1.667-.746-1.667-1.667z"
                                    />
                                </g>
                            </svg>
                        </span>

                        <span id="is-downloading" class="iconContainer">
                            <svg
                                class="spin"
                                fill="currentColor"
                                viewBox="0 0 24 24"
                                xmlns="http://www.w3.org/2000/svg"
                            >
                                <path
                                    d="M12,1A11,11,0,1,0,23,12,11,11,0,0,0,12,1Zm0,19a8,8,0,1,1,8-8A8,8,0,0,1,12,20Z"
                                    opacity=".25"
                                />
                                <path
                                    d="M12,4a8,8,0,0,1,7.89,6.7A1.53,1.53,0,0,0,21.38,12h0a1.5,1.5,0,0,0,1.48-1.75,11,11,0,0,0-21.72,0A1.5,1.5,0,0,0,2.62,12h0a1.53,1.53,0,0,0,1.49-1.3A8,8,0,0,1,12,4Z"
                                />
                            </svg>
                        </span>
                        <span class="trn">Download background</span>
                    </button>

                    <button
                        id="b_interface-background-pause"
                        title="Lock the current background"
                        aria-label="Lock the current background"
                    >
                        <span id="interface-background-pause-icon" class="iconContainer">
                            <svg
                                fill="currentColor"
                                clip-rule="evenodd"
                                fill-rule="evenodd"
                                stroke-linejoin="round"
                                stroke-miterlimit="2"
                                viewBox="0 0 18 21"
                                xmlns="http://www.w3.org/2000/svg"
                            >
                                <path
                                    d="m18 10.5c1.657 0 3 1.343 3 3v6c0 1.657-1.343 3-3 3h-12c-1.657 0-3-1.343-3-3v-6c0-1.657 1.343-3 3-3v-3c0-3.314 2.686-6 6-6s6 2.686 6 6zm-6-7c2.209 0 4 1.791 4 4v3h-8v-3c0-2.209 1.791-4 4-4zm6 9h-12c-.552 0-1 .448-1 1v6c0 .552.448 1 1 1h12c.552 0 1-.448 1-1v-6c0-.552-.448-1-1-1z"
                                    transform="translate(-3 -1.5)"
                                />
                            </svg>
                        </span>

                        <span class="trn" id="interface-background-pause-string">Lock current background</span>

                        <span id="interface-background-play-icon" class="iconContainer">
                            <svg
                                fill="currentColor"
                                clip-rule="evenodd"
                                fill-rule="evenodd"
                                stroke-linejoin="round"
                                stroke-miterlimit="2"
                                viewBox="0 0 18 21"
                                xmlns="http://www.w3.org/2000/svg"
                            >
                                <path
                                    d="m18 10.5c1.657 0 3 1.343 3 3v6c0 1.657-1.343 3-3 3h-12c-1.657 0-3-1.343-3-3v-6c0-1.657 1.343-3 3-3v-3c0-3.314 2.686-6 6-6 3.145 0 5.725 2.42 5.979 5.5h-2.01c-.246-1.973-1.929-3.5-3.969-3.5-2.209 0-4 1.791-4 4v3zm0 2h-12c-.552 0-1 .448-1 1v6c0 .552.448 1 1 1h12c.552 0 1-.448 1-1v-6c0-.552-.448-1-1-1z"
                                    transform="translate(-3 -1.5)"
                                />
                            </svg>
                        </span>

                        <span class="trn" id="interface-background-play-string">Unlock current background</span>
                    </button>

                    <button
                        id="b_interface-background-refresh"
                        class="refresh-btn"
                        title="Change to another background"
                        aria-label="Change to another background"
                    >
                        <span class="iconContainer">
                            <svg
                                fill="currentColor"
                                clip-rule="evenodd"
                                fill-rule="evenodd"
                                stroke-linejoin="round"
                                stroke-miterlimit="2"
                                viewBox="0 0 24 24"
                                xmlns="http://www.w3.org/2000/svg"
                            >
                                <path
                                    d="m20.3 13.43c-.521-.162-1.084.13-1.25.65-.967 2.956-3.76 4.956-6.87 4.92-3.888.044-7.125-3.113-7.18-7 .055-3.887 3.292-7.044 7.18-7 1.697-.004 3.343.587 4.65 1.67l-2.17-.36c-.054-.009-.108-.013-.162-.013-.49 0-.911.359-.988.843-.009.054-.013.108-.013.162 0 .49.359.911.843.988l4.24.7h.17c.116 0 .231-.02.34-.06.037-.014.07-.034.1-.06.072-.027.139-.064.2-.11l.09-.11c0-.05.09-.09.13-.15s0-.1.05-.14c.028-.058.051-.118.07-.18l.75-4c.012-.063.018-.126.018-.19 0-.558-.46-1.018-1.018-1.018-.487 0-.909.35-1 .828l-.27 1.45c-1.674-1.45-3.815-2.25-6.03-2.25-4.985-.044-9.125 4.015-9.18 9 .055 4.985 4.195 9.044 9.18 9 3.999.061 7.593-2.514 8.82-6.32.027-.092.041-.188.041-.284 0-.451-.305-.849-.741-.966z"
                                    fill-rule="nonzero"
                                    transform="matrix(1.33257 0 0 1.33257 -3.99772 -3.98641)"
                                />
                            </svg>
                        </span>
                        <span class="trn">Next background</span>
                    </button>
                </div>
            </div>
        </dialog>

        <div id="background-wrapper" class="hidden" data-type="images" data-texture="none">
            <div id="background-media"></div>
            <div id="background-color"></div>
            <div id="background-texture"></div>
        </div>

        <main id="interface">
            <div id="time">
                <div id="time-container" data-hide="clock">
                    <div id="clock-wrapper" class="clock-wrapper" data-index="0">
                        <h1 class="digital" data-hide="clock">
                            <span class="digital-hh-leading-zero">0</span><span
                                class="digital-hh"
                            ></span><span
                                class="digital-hh-separator"
                            >:</span><span
                                class="digital-mm"
                            ></span><span
                                class="digital-mm-separator"
                            >:</span><span
                                class="digital-ss"
                            ></span><span
                                class="digital-am"
                            >AM</span><span
                                class="digital-pm"
                            >PM</span>
                        </h1>

                        <div class="analog" data-hide="clock">
                            <div class="analog-face">
                                <span>12</span>
                                <span>3</span>
                                <span>6</span>
                                <span>9</span>
                            </div>

                            <div class="analog-center"></div>
                            <span class="analog-hours"></span>
                            <span class="analog-minutes"></span>
                            <span class="analog-seconds"></span>
                        </div>

                        <p class="clock-region">Paris</p>

                        <p class="clock-date" data-hide="date">
                            <span class="clock-date-aa"></span>
                            <span class="clock-date-aa-separator"></span>
                            <span class="clock-date-bb"></span>
                            <span class="clock-date-bb-separator"></span>
                            <span class="clock-date-cc"></span>
                            <span class="clock-date-secondary"></span>
                        </p>
                    </div>
                </div>
            </div>

            <div id="linkblocks">
                <div id="link-mini">
                    <div></div>
                </div>
                <div id="link-favorites"></div>
            </div>
        </main>

        <div id="credit-container">
            <div id="credit"></div>
        </div>

        <div id="show-notes">
            <button aria-label="Toggle notes panel" title="Toggle notes panel">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M5 3.5h11l3 3v14H5z"></path>
                    <path d="M16 3.5V7h3"></path>
                    <path d="M8 10.5h8"></path>
                    <path d="M8 14h8"></path>
                    <path d="M8 17.5h6"></path>
                </svg>
            </button>
        </div>

        <aside
            id="settings"
            class="init hidden"
            style="display: none"
            role="complementary"
            aria-label="Settings"
            aria-hidden="true"
            inert
        >
            <!-- settings -->
        </aside>

        <section id="notes-panel" class="hidden" aria-label="Notes" aria-hidden="true">
            <div id="notes-window">
                <header>
                    <h2>Notes</h2>
                    <button id="notes-close" title="Close notes" aria-label="Close notes">✕</button>
                </header>

                <div id="notes-layout">
                    <aside id="notes-list">
                        <div id="notes-list-header">
                            <span id="notes-list-title">All notes</span>
                            <span id="notes-count">0</span>
                        </div>
                        <ul id="notes-items"></ul>
                        <button id="notes-new" title="Create note" aria-label="Create note">+</button>
                    </aside>

                    <section id="notes-editor">
                        <div id="notes-editor-header">
                            <input id="notes-title" type="text" maxlength="120" placeholder="Untitled note" />
                        </div>
                        <textarea id="notes-content" placeholder="Write your note..."></textarea>
                    </section>
                </div>
            </div>
        </section>

        <div id="templates">
            <template id="link-group-template">
                <div class="link-group">
                    <ul class="link-list"></ul>
                    <button class="link-title"></button>
                </div>
            </template>

            <template id="link-elem-template">
                <li class="link link-elem">
                    <a rel="noreferrer noopener" draggable="false">
                        <div>
                            <img alt="" draggable="false" />
                        </div>
                        <span></span>
                    </a>
                </li>
            </template>

            <template id="link-folder-template">
                <li class="link link-folder" tabindex="0">
                    <div>
                        <img alt="" draggable="false" />
                        <img alt="" draggable="false" />
                        <img alt="" draggable="false" />
                        <img alt="" draggable="false" />
                    </div>
                    <span></span>
                </li>
            </template>

            <template id="opera-explainer-template">
                <dialog id="opera-explainer">
                    <div>
                        <h1 class="trn">Ok so... this is embarassing 😅</h1>

                        <p class="trn">
                            Opera does not allow extensions to modify its new tab. While there is no official statement,
                            we believe this is because ads on their speed dial is a good revenue source for them.
                        </p>

                        <h2 class="trn">What to do from here?</h2>

                        <ul>
                            <li class="trn">Remove Bonjourr and use Opera speed dial</li>
                            <li class="trn">Use a similar browser like Brave or Vivaldi</li>
                            <li>
                                <span class="trn">Follow </span>
                                <a href="https://github.com/yinyu985/Bonjourr" class="trn">our documentation</a>
                                <span class="trn">. Bonjourr, or any homepage, should somewhat work!</span>
                            </li>
                        </ul>
                    </div>

                    <hr />

                    <button id="b_opera-explained" class="trn">Close and access Bonjourr</button>
                </dialog>
            </template>

            <!-- help-mode -->
            <style>
                #help-mode-prompt {
                    position: fixed;
                    top: 40vh;
                    left: 0;
                    right: 0;
                    color: #eeeeee;
                    font-family: system-ui;
                    font-size: 1em;
                    text-align: center;
                    z-index: 1;
                }

                #help-mode-prompt h1 {
                    margin-bottom: 0;
                }

                #help-mode-prompt p {
                    margin-top: 0.5em;
                }

                #help-buttons {
                    margin-top: 1.5em;
                    display: flex;
                    justify-content: center;
                    gap: 1em;
                }

                .help-btn {
                    cursor: pointer;
                    height: 31px;
                    padding: 0 1em;
                    color: var(--color-blue);
                    border: none;
                    border-radius: 1em;
                    white-space: nowrap;
                    background-color: rgba(var(--blue), 0.25);
                    display: inline-flex;
                    justify-content: center;
                    align-items: center;
                    gap: 5px;
                }

                .help-btn:hover {
                    background-color: rgba(var(--blue), 0.35);
                }

                .help-btn[disabled] {
                    color: #777777;
                    background-color: #282828;
                    cursor: not-allowed;
                }

                .help-btn.danger:hover {
                    color: var(--color-red);
                    background-color: rgba(var(--red), 0.25);
                }
            </style>
        </div>
    </body>
